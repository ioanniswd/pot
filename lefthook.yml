pre-commit:
  parallel: true
  env:
    PATH: "$HOME/.bun/bin:$PATH"
  commands:
    format:
      glob: "*.{ts,json,yml,yaml}"
      run: bunx biome format --write --no-errors-on-unmatched {staged_files}
    lint:
      glob: "*.ts"
      run: bunx biome lint --no-errors-on-unmatched {staged_files}
