name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  actions: read

jobs:
  compile:
    name: Compile ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-latest
            artifact: pot-linux-x64
          - target: bun-linux-arm64
            os: ubuntu-latest
            artifact: pot-linux-arm64
          - target: bun-darwin-x64
            os: macos-latest
            artifact: pot-darwin-x64
          - target: bun-darwin-arm64
            os: macos-latest
            artifact: pot-darwin-arm64
          - target: bun-windows-x64
            os: windows-latest
            artifact: pot-windows-x64.exe
          - target: bun-windows-arm64
            os: windows-latest
            artifact: pot-windows-arm64.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6  # v2.2.0
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Compile binary
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file CHANGELOG.md \
            dist/pot-linux-x64 \
            dist/pot-linux-arm64 \
            dist/pot-darwin-x64 \
            dist/pot-darwin-arm64 \
            dist/pot-windows-x64.exe \
            dist/pot-windows-arm64.exe
